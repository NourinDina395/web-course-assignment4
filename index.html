<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- remove icon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" />



    <!--Tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


      <style class="">

         * {
              font-family: "Geist", sans-serif;

         }

      </style>

</head>

<body class="min-h-screen max-w-4xl bg-base-100 mx-auto">

 
    <header class="max-w-4xl border border-base-100 top-0 bg-base-100 pt-4 w-[1110px] h-[200px] ">

         <div class="heading">
            <h1 class="text-3xl font-bold text-[#002C5C] mb-4">Job Application Tracker</h1>
         </div>

     <!--Card portion-->
      <div class="stats stats-vertical sm:stats-horizontal bg-base-100 gap-6
       mb-10 border border-base-200 rounded-sm overflow-hidden w-full mx-auto">
        
                    
      <!-- Total -->
      <div class="stat place-items-center py-6 border-2 border-base-300">
    <div class="stat-title text-base-content/70 text-[#323B49]">Total</div>
      <div class="stat-value text-4xl font-extrabold text-primary text-[#002C5C]" id="total">8</div>
      </div>

     <!-- Interview -->
     <div class="stat place-items-center py-6 border-2 border-base-300">
    <div class="stat-title text-base-content/70 text-[#323B49]">Interview</div>
    <div class="stat-value text-4xl font-extrabold text-success" id="interview-count">0</div>
     </div>

    <!-- Rejected -->
    <div class="stat place-items-center py-6 border-2 border-base-300">
    <div class="stat-title text-base-content/70 text-[#323B49]">Rejected</div>
    <div class="stat-value text-4xl font-extrabold text-error" id="rejected-count">0</div>
    </div>

     </div>

   </header>


   <section>
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold text-[#002C5C]">Available Jobs</h2>
        <span id="jobs-count" class="text-gray-600">8 jobs</span>
    </div>

    <div class="tabs mb-4">
        <a class="tab tab-bordered tab-active" data-tab="pending" onclick="setTab('pending')">All</a>
        <a class="tab tab-bordered" data-tab="interview" onclick="setTab('interview')">Interview</a>
        <a class="tab tab-bordered" data-tab="rejected" onclick="setTab('rejected')">Rejected</a>
    </div>

    <div id="jobs-container" class="grid grid-cols-1 gap-4"></div>

    </section>


    <script src="./js/script.js"></script>
</body>

</html>
