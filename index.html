<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- remove icon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" />



    <!--Tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--Font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


      <style class="">

         * {
              font-family: "Geist", sans-serif;

         }

      </style>

</head>

<body class="min-h-screen bg-[#F8FAFC]">

<div class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-8">

  <!-- Header & Stats -->
  <header class="mb-10">
    <h1 class="text-3xl sm:text-4xl font-bold text-[#002C5C] mb-6">Job Application Tracker</h1>

    <div class="stats stats-vertical sm:stats-horizontal bg-white w-full
           border-gray-200 rounded-xl  overflow-hidden gap-5">
      <!-- Total -->
      <div class="stat place-items-center py-6 border-2 border-gray-200 rounded-xl">
        <div class="stat-title text-gray-800 font-semibold">Total</div>
        <div class="stat-value text-4xl sm:text-5xl font-extrabold text-[#002C5C]" id="total">8</div>
      </div>

      <!-- Rejected -->
      <div class="stat place-items-center py-6 border-2 border-gray-200  rounded-xl">
        <div class="stat-title text-gray-800 font-semibold">Rejected</div>
        <div class="stat-value text-4xl sm:text-5xl font-extrabold text-[#EF4444]" id="rejected-count">0</div>
      </div>
      
      <!-- Interview -->
      <div class="stat place-items-center py-6 border-2 border-gray-200  rounded-xl">
        <div class="stat-title text-gray-800 font-semibold">Interview</div>
        <div class="stat-value text-4xl sm:text-5xl font-extrabold text-[#10B981]" id="interview-count">0</div>
      </div>

      

    </div>
  </header>

  <!-- Jobs Section -->
  <section>
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
      <h2 class="text-2xl sm:text-3xl font-semibold text-[#002C5C]">Available Jobs</h2>
      <span id="jobs-count" class="text-[#323B49] text-lg font-medium">8 jobs</span>
    </div>

    <!-- Tabs -->
    <div role="tablist" class="tabs tabs-boxed  p-1 rounded-lg mb-6 w-full sm:w-auto">
      <a role="tab" class="tab tab-active bg-primary text-[#64748B] font-medium 
        px-6 btn-soft btn-primary " data-tab="all" onclick="setTab('all')">All</a>
      <a role="tab" class="tab  px-6 font-medium " data-tab="interview" onclick="setTab('interview')">Interview</a>
      <a role="tab" class="tab px-6 font-medium " data-tab="rejected" onclick="setTab('rejected')">Rejected</a>
    </div>

    <div id="jobs-container" class="grid grid-cols-1 gap-5"></div>
  </section>

</div>



    <script src="./js/script.js"></script>
</body>

</html>
